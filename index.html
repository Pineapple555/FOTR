<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOTR — Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════ -->
<div id="login-page">
  <div class="login-wrap">

    <div class="login-brand">
      <div class="login-logo">F</div>
      <h1 class="login-title">FOTR</h1>
      <p class="login-tagline">Workspace personal de Francisco Osorio</p>
    </div>

    <div class="login-card">
      <h2 class="login-card-title">Iniciar sesión</h2>
      <p class="login-card-sub">Ingresa tus credenciales para acceder al workspace.</p>

      <div id="login-error" class="login-error" hidden></div>

      <form id="login-form" novalidate autocomplete="on">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="inp-wrap">
            <i data-lucide="mail" class="inp-icon"></i>
            <input id="email" type="email" placeholder="tu@email.com"
                   autocomplete="email" required>
          </div>
        </div>

        <div class="field">
          <label for="pwd">Contraseña</label>
          <div class="inp-wrap">
            <i data-lucide="lock" class="inp-icon"></i>
            <input id="pwd" type="password" placeholder="••••••••"
                   autocomplete="current-password" required>
            <button type="button" class="eye-btn" onclick="UI.togglePwd(this)" tabindex="-1">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="submit-btn">
          Ingresar al workspace
        </button>
      </form>

      <div class="login-hint">
        <i data-lucide="info"></i>
        Demo: foz / 1155
      </div>
    </div>

    <p class="login-copy">FOTR Workspace &copy; 2026</p>
  </div>
</div>


<!-- ══════════════════════════════════════
     APP SHELL
══════════════════════════════════════ -->
<div id="app-shell" class="hidden">

  <!-- Header -->
  <header class="hdr" id="app-header"></header>

  <!-- Main content -->
  <main class="main">
    <div class="main-inner">

      <!-- Page heading -->
      <div class="page-hdr">
        <div>
          <h2 class="page-title">Mis aplicaciones</h2>
          <p class="page-sub">
            Accede a tus proyectos, herramientas internas y dashboards desde un solo lugar.
          </p>
        </div>
        <button class="filter-btn" id="filter-btn" aria-label="Filtrar aplicaciones">
          <i data-lucide="sliders-horizontal"></i>
          Filtrar
        </button>
      </div>

      <!-- Search bar -->
      <div class="search-wrap">
        <i data-lucide="search" class="search-ico"></i>
        <input id="search" type="search" class="search-inp" placeholder="Buscar aplicaciones…"
               autocomplete="off" spellcheck="false">
      </div>

      <!-- Filter chips (collapsed by default) -->
      <div class="chip-bar hidden" id="filter-panel">
        <button class="chip active" data-f="all">Todas</button>
        <button class="chip" data-f="active">Activas</button>
        <button class="chip" data-f="development">En desarrollo</button>
        <button class="chip" data-f="coming-soon">Próximamente</button>
      </div>

      <!-- Apps grid (populated by JS) -->
      <div class="apps-grid" id="apps-grid"></div>

    </div>
  </main>

  <!-- Mobile bottom navigation -->
  <nav class="bot-nav" aria-label="Navegación principal">
    <button class="nav-tab active" data-tab="apps"
            onclick="UI.setNav('apps')">
      <i data-lucide="grid-2x2"></i>
      <span>Apps</span>
    </button>
    <button class="nav-tab" data-tab="fav"
            onclick="UI.setNav('fav'); toast('Favoritos — próximamente')">
      <i data-lucide="star"></i>
      <span>Favoritos</span>
    </button>
    <button class="nav-tab" data-tab="notif"
            onclick="UI.setNav('notif'); toast('Notificaciones — próximamente')">
      <i data-lucide="bell"></i>
      <span>Notificaciones</span>
    </button>
    <button class="nav-tab" data-tab="cfg"
            onclick="UI.setNav('cfg'); toast('Ajustes — próximamente')">
      <i data-lucide="settings"></i>
      <span>Ajustes</span>
    </button>
  </nav>

</div><!-- /app-shell -->


<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="app.js"></script>
</body>
</html>
